services:
  ros2_jazzy:
    container_name: ros2_jazzy_compose
    stdin_open: true
    tty: true
    ipc: host
    environment:
      - TERM=xterm-256color
      - DISPLAY=host.docker.internal:0.0
    volumes:
      - ./workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
    build:
      context: .
      network: default
